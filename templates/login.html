<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - HITNA Superette</title>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.jpg') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: auto;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(42, 82, 152, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .forgot-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .forgot-link a {
            color: #2a5298;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .forgot-link a:hover {
            color: #1e3c72;
            text-decoration: underline;
        }
        
        .forgot-link.admin-only {
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            margin-top: 10px;
        }
        
        .info-box {
            background: #e8f4fd;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .info-box p {
            margin: 5px 0;
        }
        
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }
        
        .flash-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            border-left: 4px solid #dc3545;
        }
        
        .flash-message.success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            select, input {
                padding: 10px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="HITNA" class="logo" onerror="this.style.display='none'">
            </div>
            
            <h1>🏪 HITNA</h1>
            <div class="subtitle">Système de gestion de superette</div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="post">
                <div class="form-group">
                    <label>👤 Rôle</label>
                    <select name="role" required>
                        <option value="">-- Sélectionnez votre rôle --</option>
                        {% for role in roles %}
                            <option value="{{ role.role_affiche }}">{{ role.role_affiche }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>🔐 Mot de passe</label>
                    <input type="password" name="password" placeholder="Votre mot de passe" required>
                </div>
                
                <button type="submit" class="btn-login">🔑 Se connecter</button>
            </form>
            
            <!-- Lien mot de passe oublié - visible pour tout le monde mais redirige vers admin -->
            <div class="forgot-link admin-only">
                <a href="/mot_de_passe_oublie">
                    🔐 L'administrateur a oublié son mot de passe ?
                </a>
            </div>
            
            <hr>
           
        </div>
    </div>
</body>
</html>
